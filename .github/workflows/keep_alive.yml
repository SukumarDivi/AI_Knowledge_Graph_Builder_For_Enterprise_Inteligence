name: Keep Streamlit Alive

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -L \
            --max-time 120 \
            --retry 3 \
            --retry-delay 10 \
            --retry-max-time 180 \
            -o /dev/null \
            -w "HTTP Status: %{http_code}\n" \
            https://aiknowledgegraphbuilderforenterpriseinteligence.streamlit.app/ \
            || true
          echo "Ping completed"