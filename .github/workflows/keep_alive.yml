name: Keep Streamlit Alive

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch:

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -L --max-time 60 \
          https://ai-knowledge-graph-builder-for-enterprise-intelligence.streamlit.app/
          echo "Pinged successfully"